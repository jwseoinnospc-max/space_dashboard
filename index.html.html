<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Space Company Q1 Dashboard</title>
<style>
:root{--blue:#2457b7;--navy:#0d2b69;--purple:#6e2fad;--sky:#74a7e2;--line:#d9dce5;--red:#d12b2b;--bg:#f5f7fb}*{box-sizing:border-box}body{margin:0;font-family:Arial,'Noto Sans KR',sans-serif;background:var(--bg);color:#15223d}.wrap{max-width:1280px;margin:auto;padding:20px}.top{display:flex;gap:14px;align-items:center;justify-content:space-between;margin-bottom:14px}.title{font-size:24px;font-weight:800;color:var(--navy)}select{padding:10px 14px;border:1px solid var(--line);border-radius:10px;background:white;font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}.panel{background:white;border:1px solid #cfd5e6;border-radius:0 0 18px 18px;box-shadow:0 3px 12px rgba(20,40,90,.08);overflow:hidden}.bar{background:#365dbc;color:white;text-align:center;font-weight:800;padding:9px}.comparison{display:grid;grid-template-columns:1fr 80px 1fr;align-items:center;padding:20px 18px 10px}.half{display:flex;flex-direction:column;align-items:center}.period{font-size:18px;font-weight:800;margin-bottom:12px}.donut{width:150px;height:150px;border-radius:50%;position:relative;box-shadow:inset 0 0 0 18px white}.donut:after{content:"";position:absolute;inset:31px;background:white;border-radius:50%;box-shadow:0 3px 16px rgba(0,0,0,.18)}.center{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;flex-direction:column;font-weight:900;color:#2360d5}.center small{font-size:11px;color:#111}.legend{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;margin-top:12px;font-size:12px;text-align:center}.lg b{display:inline-block;width:10px;height:10px;margin-right:4px}.arrow{text-align:center;color:#1c4fa8;font-weight:800}.arrow .arr{font-size:44px;color:#dfeefa}.arrow .chg{font-size:18px;color:var(--red)}.tablebox{margin:8px 16px 14px;border:1.5px solid var(--navy);border-radius:10px;padding:8px 16px}.tabletitle{text-align:center;font-weight:800;color:var(--navy);font-size:13px;border-bottom:2px solid #333;padding-bottom:6px}table{width:100%;border-collapse:collapse;font-size:12px}th,td{padding:5px;border-bottom:1px solid #e5e5e5;text-align:right}th:first-child,td:first-child{text-align:left}tr:last-child td{border-bottom:0;font-weight:900;color:#111}.pos{color:#0b3d91;font-weight:900}.neg{color:#c92222;font-weight:900}.insight{display:grid;grid-template-columns:170px 1fr;gap:16px;margin-top:14px;background:white;border:1px solid #c7c7c7;border-radius:4px;padding:14px}.badge{background:#f4f0f8;border-radius:8px;padding:18px;font-weight:900;color:#111;text-align:center}.bullets{color:#0b3d91;font-weight:700;line-height:1.55}.foot{margin-top:10px;color:#61708f;font-size:12px}.note{padding:0 16px 14px;color:#667085;font-size:11px}@media(max-width:900px){.grid{grid-template-columns:1fr}.comparison{grid-template-columns:1fr}.arrow{padding:10px}.insight{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.donut{width:132px;height:132px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><div class="title">우주기업 1Q 실적 반응형 대시보드</div><div class="foot">단위: 백만 달러 · Rocket Lab / Firefly Aerospace</div></div><select id="company"><option value="rocket">Rocket Lab</option><option value="firefly">Firefly Aerospace</option></select></div>
  <div class="grid"><section class="panel" id="revenue"></section><section class="panel" id="gross"></section></div>
  <div class="insight"><div class="badge">💡 핵심 인사이트</div><div class="bullets" id="insights"></div></div>
  <div class="foot">Sources: Rocket Lab 10-Q, Firefly Q1 2026 filing/earnings summaries. Firefly gross profit by segment is not disclosed in the source used, so gross-profit donut is shown at company-total level.</div>
</div>
<script>
const color={Launch:'#24499b',Space:'#6e2fad',AI:'#74a7e2',Total:'#24499b'};
const data={
 rocket:{name:'Rocket Lab', cats:['Launch Services','Space Systems'], rev:{'2025 1Q':[35.592,86.977], '2026 1Q':[63.663,136.685]}, gp:{'2025 1Q':[7.217,28.030], '2026 1Q':[28.223,48.270]}, insight:['매출은 122.6 → 200.3로 +63% 증가','Space Systems가 136.7로 전체 매출의 68%를 차지하며 성장 견인','Launch Services는 35.6 → 63.7로 +79% 성장','매출총이익은 35.2 → 76.5로 +117% 증가하며 수익성 개선']},
 firefly:{name:'Firefly Aerospace', cats:['Launch','Spacecraft Solutions'], rev:{'2025 1Q':[5.2,50.7], '2026 1Q':[13.3,67.6]}, gp:{'2025 1Q':[2.2], '2026 1Q':[17.5]}, insight:['매출은 55.9 → 80.9로 +45% 증가','Spacecraft Solutions가 67.6로 전체 매출의 84%를 차지','Launch 매출은 13.3으로 전년 대비 +156% 성장','매출총이익은 2.2 → 17.5로 확대되고 총마진은 4.0% → 21.6%로 개선']}
};
function pct(a,b){return Math.round((b-a)/a*100)}
function fmt(n){return n.toLocaleString(undefined,{maximumFractionDigits:1})}
function donut(vals,keys,total){let deg=0; let stops=[]; vals.forEach((v,i)=>{let d=v/total*360; let c=i==0?color.Launch:i==1?color.Space:color.AI; stops.push(`${c} ${deg}deg ${deg+d}deg`); deg+=d}); return `conic-gradient(${stops.join(',')})`}
function block(type, title, unit){const d=data[document.getElementById('company').value]; const vals=d[type]; const y1='2025 1Q', y2='2026 1Q'; const a=vals[y1], b=vals[y2]; const ta=a.reduce((x,y)=>x+y,0), tb=b.reduce((x,y)=>x+y,0); const cats=d.cats.length===a.length?d.cats:['Total']; const colors=[color.Launch,color.Space,color.AI]; let rows=cats.map((c,i)=>`<tr><td><span class="lg"><b style="background:${colors[i]}"></b></span>${c}</td><td>${fmt(a[i]||ta)} (${Math.round((a[i]||ta)/ta*100)}%)</td><td>${fmt(b[i]||tb)} (${Math.round((b[i]||tb)/tb*100)}%)</td><td class="${pct(a[i]||ta,b[i]||tb)>=0?'pos':'neg'}">${pct(a[i]||ta,b[i]||tb)>0?'+':''}${pct(a[i]||ta,b[i]||tb)}%</td></tr>`).join('');
return `<div class="bar">${title}</div><div class="comparison"><div class="half"><div class="period">${y1}</div><div class="donut" style="background:${donut(a,cats,ta)}"><div class="center">${fmt(ta)}<small>${unit}</small></div></div><div class="legend">${cats.map((c,i)=>`<div><span class="lg"><b style="background:${colors[i]}"></b></span>${c}<br>${fmt(a[i]||ta)} (${Math.round((a[i]||ta)/ta*100)}%)</div>`).join('')}</div></div><div class="arrow"><div class="arr">▶</div><div>전년 동기 대비</div><div class="chg">${pct(ta,tb)>0?'+':''}${pct(ta,tb)}%</div></div><div class="half"><div class="period">${y2}</div><div class="donut" style="background:${donut(b,cats,tb)}"><div class="center">${fmt(tb)}<small>${unit}</small></div></div><div class="legend">${cats.map((c,i)=>`<div><span class="lg"><b style="background:${colors[i]}"></b></span>${c}<br>${fmt(b[i]||tb)} (${Math.round((b[i]||tb)/tb*100)}%)</div>`).join('')}</div></div></div><div class="tablebox"><div class="tabletitle">${title} 요약</div><table><thead><tr><th></th><th>${y1}</th><th>${y2}</th><th>전년 동기 대비</th></tr></thead><tbody>${rows}<tr><td>합계</td><td>${fmt(ta)}</td><td>${fmt(tb)}</td><td class="${pct(ta,tb)>=0?'pos':'neg'}">${pct(ta,tb)>0?'+':''}${pct(ta,tb)}%</td></tr></tbody></table></div>${d.name==='Firefly Aerospace'&&type==='gp'?'<div class="note">※ Firefly는 사용된 자료에서 매출총이익 세그먼트별 금액이 확인되지 않아 총액 기준으로 시각화</div>':''}`}
function render(){const d=data[company.value]; revenue.innerHTML=block('rev','매출 (Revenue)','백만 달러'); gross.innerHTML=block('gp','매출총이익 (Gross Profit)','백만 달러'); insights.innerHTML=d.insight.map(x=>`• ${x}`).join('<br>')}
company.onchange=render; render();
</script>
</body>
</html>
