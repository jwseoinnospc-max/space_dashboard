<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Company Financial Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">Investor Dashboard</p>
        <h1>우주기업 1Q 실적 대시보드</h1>
        <p class="subtitle">Rocket Lab / Firefly Aerospace · 전년 동기 비교 · 반응형 차트</p>
      </div>
      <div class="controls">
        <label>회사
          <select id="companySelect"></select>
        </label>
        <label>비교 기간
          <select id="periodSelect"></select>
        </label>
      </div>
    </header>

    <section class="kpi-grid" id="kpiGrid"></section>

    <section class="dashboard-grid">
      <article class="card metric-card" data-metric="revenue">
        <div class="card-title">매출 <span>Revenue</span></div>
        <div class="comparison">
          <div class="chart-block">
            <h3 id="revenuePrevLabel"></h3>
            <canvas id="revenuePrevChart"></canvas>
          </div>
          <div class="growth-arrow">
            <div class="arrow">▶</div>
            <small>전년 동기 대비</small>
            <strong id="revenueGrowth"></strong>
          </div>
          <div class="chart-block">
            <h3 id="revenueCurrLabel"></h3>
            <canvas id="revenueCurrChart"></canvas>
          </div>
        </div>
        <div class="table-wrap" id="revenueTable"></div>
      </article>

      <article class="card metric-card" data-metric="grossProfit">
        <div class="card-title">매출총이익 <span>Gross Profit</span></div>
        <div class="comparison">
          <div class="chart-block">
            <h3 id="grossPrevLabel"></h3>
            <canvas id="grossPrevChart"></canvas>
          </div>
          <div class="growth-arrow">
            <div class="arrow">▶</div>
            <small>전년 동기 대비</small>
            <strong id="grossGrowth"></strong>
          </div>
          <div class="chart-block">
            <h3 id="grossCurrLabel"></h3>
            <canvas id="grossCurrChart"></canvas>
          </div>
        </div>
        <div class="table-wrap" id="grossTable"></div>
        <p class="note" id="grossNote"></p>
      </article>
    </section>

    <section class="insight-card">
      <div class="insight-badge">💡 핵심 인사이트</div>
      <div id="insights" class="insights"></div>
    </section>

    <footer>
      <strong>Sources</strong>
      <span id="sourceList"></span>
    </footer>
  </main>
  <script src="js/dashboard.js"></script>
</body>
</html>
