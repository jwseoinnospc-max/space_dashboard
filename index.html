<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>우주기업 실적 대시보드</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <p class="eyebrow">Space Financial Dashboard</p>
        <h1>우주기업 실적 대시보드</h1>
        <p class="subtitle">Rocket Lab과 Firefly Aerospace의 2026년 1분기 실적을 카드, 차트, 핵심 인사이트로 비교합니다</p>
      </div>
      <div class="controls">
        <label for="companySelect">기업 선택</label>
        <select id="companySelect"></select>
      </div>
    </section>

    <section class="summary" id="summaryCards"></section>

    <section class="grid">
      <article class="panel wide">
        <div class="panel-head">
          <div>
            <p class="label">Revenue Mix</p>
            <h2>사업부별 매출 비중</h2>
          </div>
          <span class="pill" id="periodBadge"></span>
        </div>
        <div class="chart-wrap"><canvas id="revenueChart"></canvas></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="label">Gross Profit</p>
            <h2>수익성 구조</h2>
          </div>
        </div>
        <div class="chart-wrap small"><canvas id="profitChart"></canvas></div>
      </article>

      <article class="panel">
        <div class="panel-head">
          <div>
            <p class="label">Insights</p>
            <h2>핵심 인사이트</h2>
          </div>
        </div>
        <ul class="insights" id="insights"></ul>
      </article>

      <article class="panel wide">
        <div class="panel-head">
          <div>
            <p class="label">Segment Table</p>
            <h2>세그먼트 상세</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>사업부</th><th>매출</th><th>비중</th><th>매출총이익</th></tr></thead>
            <tbody id="segmentRows"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="source-box">
      <strong>데이터 출처</strong>
      <p id="sourceText"></p>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
